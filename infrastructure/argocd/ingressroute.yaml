apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.cluster.wool.homes`)
      kind: Rule
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: argocd-server
          port: 80
  tls:
    store:
      name: default
      namespace: traefik
---
# Tell ArgoCD it's behind a reverse proxy so it doesn't redirect to HTTPS itself
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"
---
# Ensure argocd-server actually rolls and applies insecure mode behind Traefik.
# Keep this env var sourced from argocd-cmd-params-cm to avoid conflicts with
# Argo CD's own Deployment defaults across versions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  template:
    metadata:
      annotations:
        argocd-config/rollout: "server-insecure-true"
    spec:
      containers:
        - name: argocd-server
          env:
            - name: ARGOCD_SERVER_INSECURE
              value: ""
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: server.insecure
                  optional: true
