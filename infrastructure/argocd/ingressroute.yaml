apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.cluster.wool.homes`)
      kind: Rule
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: argocd-server
          port: 80
  tls: {}
---
# Tell ArgoCD it's behind a reverse proxy so it doesn't redirect to HTTPS itself
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"
