# Sets the wildcard cert as Traefik's default certificate.
# IngressRoutes reference this store explicitly via:
# tls:
#   store:
#     name: default
#     namespace: traefik
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: wildcard-cluster-wool-homes-tls
