# Staging issuer — use this first to test your DNS-01 setup (no rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@wool.homes
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            # Secret value must be the raw Cloudflare API token string.
            # Do not prefix it with "CF_TOKEN=".
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# Production issuer — switch to this once staging works
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@wool.homes
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            # Secret value must be the raw Cloudflare API token string.
            # Do not prefix it with "CF_TOKEN=".
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
