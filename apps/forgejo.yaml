apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Forgejo Helm chart (OCI from Codeberg)
    - repoURL: oci://code.forgejo.org/forgejo-helm
      chart: forgejo
      targetRevision: "16.2.2"
      helm:
        releaseName: forgejo
        valueFiles:
          - $values/services/forgejo/values.yaml
    # Values file from gitops repo
    - repoURL: https://github.com/esize/cluster-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
